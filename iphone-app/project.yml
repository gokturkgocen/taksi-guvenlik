name: TaksiGuvenlik
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.gokturk
  developmentLanguage: tr
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MACCATALYST: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""                  # Xcode UI'dan eklenecek
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: TaksiGuvenlik/Info.plist

targets:
  TaksiGuvenlik:
    type: application
    platform: iOS
    sources:
      - path: TaksiGuvenlik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gokturk.taksiguvenlik
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
    scheme:
      testTargets: []
      gatherCoverageData: false

schemes:
  TaksiGuvenlik:
    build:
      targets:
        TaksiGuvenlik: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
