# Taksi Guvenlik — merkezi konfigurasyon
# CLI flag'leri bu degerleri overlayler.

recognition:
  threshold: 0.5          # cosine similarity esigi (MATCH icin min)
  det_size: 640           # RetinaFace det boyutu (buyuk=dogru, yavas)
  every: 3                # her N frame'de 1 detection (FPS/CPU tradeoff)

antispoof:
  enabled: true
  spoof_threshold: 0.6    # medyan real_score >= bu ise canli (MiniFASNet CNN)
  motion_threshold: 1.5   # medyan frame-to-frame diff esigi (0 = kapali)

challenge:
  enabled: true
  yaw_range_threshold: 0.12  # 90-10 persentil araligi; 0.12+ kafa hareketi var

tracker:
  iou_thr: 0.3
  max_missed: 10
  min_obs: 1              # karar icin minimum track gozlem sayisi

emitter:
  serial_port: null       # /dev/tty.usbmodem... (Mac) - null ise sadece konsol
  baud: 9600
  cooldown_s: 10          # ayni kisiye art arda emit engelle

log:
  path: events.jsonl      # JSONL event log

camera: 0                 # 0 = default webcam, URL de olabilir (IP webcam)
